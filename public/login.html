<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopify Product Importer — Login</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
      .login-container {
        max-width: 420px;
        margin: 80px auto;
        padding: 0 16px;
      }
      .login-card {
        background: white;
        border-radius: 12px;
        padding: 40px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      }
      .login-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .login-header h1 {
        font-size: 1.6rem;
        color: #1a1a2e;
        margin: 8px 0 4px;
      }
      .login-header p {
        color: #666;
        font-size: 0.9rem;
      }
      .error-msg {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.875rem;
        margin-bottom: 16px;
        display: none;
      }
      .error-msg.visible { display: block; }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <div style="font-size:2.5rem">📦</div>
          <h1>Product Importer</h1>
          <p>Sign in to continue</p>
        </div>
        <div id="errorMsg" class="error-msg">Invalid username or password</div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div style="position:relative">
              <input type="password" id="password" name="password" autocomplete="current-password" required style="padding-right:48px" />
              <button type="button" onclick="togglePeek()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#666;font-size:0.85rem" id="peekBtn">Show</button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px" id="loginBtn">
            Sign in
          </button>
          <p style="text-align:center;margin-top:16px;font-size:0.85rem">
            <a href="mailto:cisco@ramola.app?subject=Product Importer - Password Reset" style="color:#6366f1">Forgot password?</a>
          </p>
        </form>
      </div>
    </div>
    <script>
      function togglePeek() {
        const input = document.getElementById('password');
        const btn = document.getElementById('peekBtn');
        if (input.type === 'password') {
          input.type = 'text';
          btn.textContent = 'Hide';
        } else {
          input.type = 'password';
          btn.textContent = 'Show';
        }
      }

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/';
        } else {
          document.getElementById('errorMsg').classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      });
    </script>
  </body>
</html>
