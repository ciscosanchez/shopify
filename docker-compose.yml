services:
  shopify-importer:
    build: .
    container_name: shopify-importer
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shopify.rule=Host(`shopify.ramola.app`)"
      - "traefik.http.routers.shopify.entrypoints=websecure"
      - "traefik.http.routers.shopify.tls.certresolver=letsencrypt"
      - "traefik.http.services.shopify.loadbalancer.server.port=3000"
    networks:
      - ramola

networks:
  ramola:
    external: true
    name: ramola
